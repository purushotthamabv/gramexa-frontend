<section class="mx-auto max-w-7xl px-5 py-10">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Wishlist</h1>
        <p class="mt-1 text-gray-500">Saved products you want to revisit.</p>
    </div>

    <p *ngIf="isLoading" class="py-10 text-center text-gray-500">Loading wishlist...</p>
    <p *ngIf="errorMessage" class="py-10 text-center text-red-600">{{ errorMessage }}</p>
    <p *ngIf="!isLoading && !errorMessage && items.length === 0" class="py-10 text-center text-gray-500">
        Your wishlist is empty.
    </p>

    <div *ngIf="items.length > 0" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-4">
        <div *ngFor="let item of items" class="rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
            <img [src]="item.product.image" [alt]="item.product.name" class="h-32 w-full rounded-xl object-cover">
            <h3 class="mt-3 font-bold text-gray-800">{{ item.product.name }}</h3>
            <p class="mt-1 line-clamp-1 text-sm text-gray-500">{{ item.product.description }}</p>
            <p class="mt-2 font-bold text-green-700">₹{{ item.product.price }}</p>

            <div class="mt-4 grid grid-cols-2 gap-2">
                <button type="button" (click)="addToCart(item.product.id)" class="rounded-xl bg-green-600 py-2 text-sm font-semibold text-white">
                    Cart
                </button>
                <button type="button" (click)="remove(item.product.id)" class="rounded-xl border border-red-200 py-2 text-sm font-semibold text-red-500">
                    Remove
                </button>
            </div>
        </div>
    </div>
</section>
