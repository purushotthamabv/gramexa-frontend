<section class="max-w-7xl mx-auto px-6 py-16">
    <!-- HEADER -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">
                {{ title }}
            </h2>
            <p class="text-gray-500 mt-2">
                {{ subTitle }}
            </p>
        </div>
        <button
            type="button"
            (click)="openProducts()"
            class="border border-green-600 text-green-700 px-6 py-3 rounded-full hover:bg-green-50 transition-all duration-300">
            View All →
        </button>
    </div>

    <p *ngIf="isLoading" class="py-10 text-center text-gray-500">
        Loading products...
    </p>

    <p *ngIf="errorMessage" class="py-10 text-center text-red-600">
        {{ errorMessage }}
    </p>

    <p *ngIf="actionMessage" class="mb-5 rounded-xl bg-green-50 px-4 py-3 text-sm font-semibold text-green-700">
        {{ actionMessage }}
    </p>

    <p *ngIf="actionError" class="mb-5 rounded-xl bg-red-50 px-4 py-3 text-sm font-semibold text-red-600">
        {{ actionError }}
    </p>

    <!-- PRODUCTS GRID -->
    <div *ngIf="!isLoading && !errorMessage" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <!-- PRODUCT CARD -->
        <div *ngFor="let product of products; trackBy: trackByProductId"
            role="button"
            tabindex="0"
            (click)="openProducts()"
            (keydown.enter)="openProducts()"
            (keydown.space)="openProducts()"
            class="product-card bg-white rounded-[18px] border border-gray-100 shadow-[0_10px_26px_rgba(15,23,42,0.08)] hover:shadow-[0_16px_36px_rgba(22,101,52,0.15)] hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group cursor-pointer">
            <!-- BADGE -->
            <div *ngIf="product.badge"
                class="absolute top-[12px] left-[12px] z-10 bg-red-500 text-white text-[11px] px-2.5 py-1 rounded-full shadow-lg">
                {{ product.badge }}
            </div>
            <button
                type="button"
                aria-label="Add to wishlist"
                [disabled]="isUpdatingWishlist(product.id)"
                (click)="toggleWishlist(product, $event)"
                [class.bg-red-500]="isWishlisted(product.id)"
                [class.text-white]="isWishlisted(product.id)"
                [class.bg-white]="!isWishlisted(product.id)"
                [class.text-red-500]="!isWishlisted(product.id)"
                class="absolute top-[10px] right-[10px] z-10 flex h-8 w-8 items-center justify-center rounded-full shadow-md transition hover:scale-105 hover:bg-red-50 disabled:cursor-wait disabled:opacity-70">
                &hearts;
            </button>
            <!-- IMAGE -->
            <div class="product-image-wrap flex items-center justify-center bg-gradient-to-br from-green-50 via-white to-emerald-50">
                <img [src]="product.image"
                    [alt]="product.name"
                    loading="lazy"
                    decoding="async"
                    class="product-image object-cover group-hover:scale-105 transition-all duration-500">
            </div>
            <div class="product-content p-3">
                <!-- CATEGORY -->
                <span class="inline-block bg-green-100 text-green-700 text-[11px] font-semibold px-2.5 py-1 rounded-full mb-2">
                    {{ product.category }}
                </span>
                <!-- NAME -->
                <h3 class="product-name text-sm font-bold text-gray-800 leading-5 mb-1">
                    {{ product.name }}
                </h3>
                <!-- DESCRIPTION -->
                <p class="product-description text-xs text-gray-500 leading-5 mb-2.5">
                    {{ product.description }}
                </p>
                <!-- PRICE -->
                <div class="flex items-center gap-2 mb-2.5">
                    <span class="text-lg font-bold text-green-700">
                        ₹{{ product.price }}
                    </span>
                    <span class="text-sm text-gray-400 line-through">
                        ₹{{ product.oldPrice }}
                    </span>
                </div>
                <!-- STOCK -->
                <div *ngIf="product.stock" class="product-stock mb-2.5">
                    <div class="flex justify-between text-xs text-gray-500 mb-2">
                        <span>
                            Available
                        </span>
                        <span>
                            {{ product.stock }} Left
                        </span>
                    </div>
                    <div class="w-full h-1.5 bg-gray-200 rounded-full overflow-hidden">
                        <div class="w-[70%] h-full bg-red-500 rounded-full">
    
                        </div>
                    </div>
                </div>
                <!-- BUTTON -->
                <button
                    type="button"
                    [disabled]="isAddingToCart(product.id)"
                    (click)="addToCart(product, $event)"
                    class="product-action w-full bg-green-600 hover:bg-green-700 disabled:bg-green-400 disabled:cursor-wait text-white py-2 rounded-xl text-sm font-semibold shadow-lg shadow-green-600/20 transition-all duration-300 hover:scale-[1.02]">
                    {{ isAddingToCart(product.id) ? 'Adding...' : 'Add to Cart +' }}
                </button>
            </div>
        </div>
    </div>
</section>
