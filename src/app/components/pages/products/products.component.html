<section class="max-w-7xl mx-auto px-6 py-16">
    <!-- HEADER -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <h2 class="text-3xl font-bold text-gray-800">
                {{ title }}
            </h2>
            <p class="text-gray-500 mt-2">
                {{ subTitle }}
            </p>
        </div>
        <button
            class="border border-green-600 text-green-700 px-6 py-3 rounded-full hover:bg-green-50 transition-all duration-300">
            View All →
        </button>
    </div>
    <!-- PRODUCTS GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- PRODUCT CARD -->
        <div *ngFor="let product of products"
            class="bg-white rounded-[30px] shadow-lg hover:-translate-y-2 transition-all duration-300 relative overflow-hidden group">
            <!-- BADGE -->
            <div *ngIf="product.badge"
                class="absolute top-[20px] left-[20px] bg-red-500 text-white text-xs px-3 py-1 rounded-full">
                {{ product.badge }}
            </div>
            <!-- IMAGE -->
            <div class="flex justify-center">
                <img [src]="product.image"
                    class="w-full h-auto object-contain group-hover:scale-110 transition-all duration-500">
            </div>
            <div class="p-4">
                <!-- CATEGORY -->
                <span class="inline-block bg-green-100 text-green-700 text-xs px-3 py-1 rounded-full mb-3">
                    {{ product.category }}
                </span>
                <!-- NAME -->
                <h3 class="text-lg font-bold text-gray-800 leading-7 mb-2">
                    {{ product.name }}
                </h3>
                <!-- DESCRIPTION -->
                <p class="text-sm text-gray-500 leading-6 mb-4">
                    {{ product.description }}
                </p>
                <!-- PRICE -->
                <div class="flex items-center gap-3 mb-5">
                    <span class="text-2xl font-bold text-green-700">
                        ₹{{ product.price }}
                    </span>
                    <span class="text-gray-400 line-through">
                        ₹{{ product.oldPrice }}
                    </span>
                </div>
                <!-- STOCK -->
                <div *ngIf="product.stock" class="mb-5">
                    <div class="flex justify-between text-xs text-gray-500 mb-2">
                        <span>
                            Available
                        </span>
                        <span>
                            {{ product.stock }} Left
                        </span>
                    </div>
                    <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                        <div class="w-[70%] h-full bg-red-500 rounded-full">
    
                        </div>
                    </div>
                </div>
                <!-- BUTTON -->
                <button
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl font-semibold transition-all duration-300 hover:scale-[1.02]">
                    Add to Cart +
                </button>
            </div>
        </div>
    </div>
</section>
