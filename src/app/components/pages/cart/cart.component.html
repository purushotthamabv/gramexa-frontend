<section class="mx-auto max-w-7xl px-5 py-10">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-800">Cart</h1>
        <p class="mt-1 text-gray-500">Products ready for checkout.</p>
    </div>

    <p *ngIf="isLoading" class="py-10 text-center text-gray-500">Loading cart...</p>
    <p *ngIf="errorMessage" class="py-10 text-center text-red-600">{{ errorMessage }}</p>
    <p *ngIf="!isLoading && !errorMessage && items.length === 0" class="py-10 text-center text-gray-500">
        Your cart is empty.
    </p>

    <div *ngIf="items.length > 0" class="grid gap-4">
        <div *ngFor="let item of items" class="flex items-center gap-4 rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
            <img [src]="item.product.image" [alt]="item.product.name" class="h-20 w-20 rounded-xl object-cover">

            <div class="min-w-0 flex-1">
                <h3 class="font-bold text-gray-800">{{ item.product.name }}</h3>
                <p class="truncate text-sm text-gray-500">{{ item.product.description }}</p>
                <p class="mt-1 text-sm font-semibold text-green-700">Qty: {{ item.quantity }}</p>
            </div>

            <div class="text-right">
                <p class="font-bold text-green-700">₹{{ item.product.price }}</p>
                <button type="button" (click)="remove(item.product.id)" class="mt-2 text-sm font-semibold text-red-500">
                    Remove
                </button>
            </div>
        </div>
    </div>
</section>
